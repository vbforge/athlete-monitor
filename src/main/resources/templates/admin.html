<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Athlete Monitor · Admin</title>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Share+Tech+Mono&family=Orbitron:wght@700;900&display=swap" rel="stylesheet"/>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{
            --bg:#050c14;--panel:rgba(8,20,35,0.95);
            --border:rgba(0,210,120,0.18);--border-h:rgba(0,210,244,0.4);
            --green:#00e87a;--cyan:#00d2f4;--red:#ff2d55;--amber:#ffb800;
            --text:#c8d8e8;--dim:#4a6070;--navy:#0d1b2a;
            --mono:'Share Tech Mono',monospace;
            --display:'Orbitron',sans-serif;
            --ui:'Rajdhani',sans-serif;
        }
        body{background:var(--bg);color:var(--text);font-family:var(--ui);min-height:100vh}
        body::before{content:'';position:fixed;inset:0;
            background:repeating-linear-gradient(0deg,transparent,transparent 2px,
            rgba(0,0,0,0.03) 2px,rgba(0,0,0,0.03) 4px);
            pointer-events:none;z-index:1000}

        /* ── header ── */
        .header{
            display:flex;align-items:center;justify-content:space-between;
            padding:.8rem 2rem;border-bottom:1px solid var(--border);
            background:var(--panel);backdrop-filter:blur(12px);
            position:sticky;top:0;z-index:100;
        }
        .logo{font-family:var(--display);font-size:1rem;letter-spacing:.15em;
            color:var(--green);text-shadow:0 0 20px rgba(0,232,122,.5)}
        .logo span{color:var(--cyan)}
        .nav-link{
            font-family:var(--mono);font-size:.7rem;letter-spacing:.1em;
            color:var(--dim);text-decoration:none;padding:.3rem .8rem;
            border:1px solid var(--border);border-radius:4px;
            transition:all .2s;
        }
        .nav-link:hover{color:var(--cyan);border-color:var(--cyan)}

        /* ── page body ── */
        .page{max-width:1200px;margin:0 auto;padding:1.5rem 2rem}

        /* ── tabs ── */
        .tabs{display:flex;gap:.5rem;margin-bottom:1.5rem}
        .tab{
            font-family:var(--display);font-size:.65rem;letter-spacing:.15em;
            padding:.45rem 1.2rem;border-radius:5px;border:1px solid var(--border);
            background:transparent;color:var(--dim);cursor:pointer;transition:all .2s;
        }
        .tab.active{background:rgba(0,210,244,.1);border-color:var(--cyan);color:var(--cyan)}
        .tab:hover:not(.active){border-color:var(--border-h);color:var(--text)}

        /* ── section ── */
        .section{display:none}
        .section.active{display:block}

        .section-header{
            display:flex;align-items:center;justify-content:space-between;
            margin-bottom:1rem;
        }
        .section-title{
            font-family:var(--display);font-size:.8rem;
            letter-spacing:.2em;color:var(--text);
        }
        .btn{
            font-family:var(--display);font-size:.6rem;letter-spacing:.1em;
            padding:.4rem 1rem;border-radius:5px;border:none;cursor:pointer;
            transition:all .2s;white-space:nowrap;
        }
        .btn-primary{background:var(--green);color:#000}
        .btn-primary:hover{box-shadow:0 0 14px rgba(0,232,122,.4)}
        .btn-danger{background:rgba(255,45,85,.12);color:var(--red);
            border:1px solid rgba(255,45,85,.35)}
        .btn-danger:hover{background:rgba(255,45,85,.22)}
        .btn-edit{background:rgba(0,210,244,.1);color:var(--cyan);
            border:1px solid rgba(0,210,244,.3)}
        .btn-edit:hover{background:rgba(0,210,244,.2)}
        .btn-sm{padding:.25rem .6rem;font-size:.55rem}

        /* ── team filter bar ── */
        .filter-bar{
            display:flex;align-items:center;gap:1rem;
            margin-bottom:1rem;padding:.6rem 1rem;
            background:var(--panel);border:1px solid var(--border);border-radius:8px;
        }
        .filter-label{font-family:var(--mono);font-size:.62rem;color:var(--dim)}
        select.filter-select{
            background:rgba(0,0,0,.5);border:1px solid var(--border);
            color:var(--text);font-family:var(--mono);font-size:.7rem;
            padding:.3rem .7rem;border-radius:4px;cursor:pointer;outline:none;
        }
        select.filter-select:focus{border-color:var(--cyan)}

        /* ── table ── */
        .table-wrap{
            background:var(--panel);border:1px solid var(--border);
            border-radius:10px;overflow:hidden;
        }
        table{width:100%;border-collapse:collapse}
        thead tr{background:rgba(0,210,120,.08);border-bottom:1px solid var(--border)}
        thead th{
            font-family:var(--display);font-size:.58rem;letter-spacing:.15em;
            color:var(--dim);padding:.7rem 1rem;text-align:left;
            white-space:nowrap;
        }
        tbody tr{border-bottom:1px solid rgba(255,255,255,.04);transition:background .15s}
        tbody tr:hover{background:rgba(0,210,244,.04)}
        tbody tr:last-child{border-bottom:none}
        td{
            font-family:var(--ui);font-size:.8rem;color:var(--text);
            padding:.6rem 1rem;vertical-align:middle;
        }
        td.mono{font-family:var(--mono);font-size:.72rem}
        .badge-dot{
            display:inline-block;width:10px;height:10px;
            border-radius:50%;margin-right:.4rem;vertical-align:middle;
        }
        .pos-badge{
            font-family:var(--mono);font-size:.6rem;color:var(--cyan);
            background:rgba(0,210,244,.1);padding:2px 6px;border-radius:3px;
        }
        .fitness-dots{display:flex;gap:2px;align-items:center}
        .fitness-dot{
            width:7px;height:7px;border-radius:50%;
            background:rgba(255,255,255,.15);
        }
        .fitness-dot.filled{background:var(--green)}
        .actions{display:flex;gap:.4rem;align-items:center}

        /* empty state */
        .empty-state{
            text-align:center;padding:3rem;
            font-family:var(--mono);font-size:.75rem;color:var(--dim);
        }

        /* ── modal ── */
        .modal-overlay{
            display:none;position:fixed;inset:0;
            background:rgba(0,0,0,.7);backdrop-filter:blur(4px);
            z-index:500;align-items:center;justify-content:center;
        }
        .modal-overlay.open{display:flex}
        .modal{
            background:var(--navy);border:1px solid var(--border-h);
            border-radius:12px;width:100%;max-width:520px;
            max-height:90vh;overflow-y:auto;
            box-shadow:0 0 40px rgba(0,210,244,.15);
        }
        .modal-header{
            display:flex;align-items:center;justify-content:space-between;
            padding:1rem 1.2rem;border-bottom:1px solid var(--border);
        }
        .modal-title{font-family:var(--display);font-size:.75rem;
            letter-spacing:.15em;color:var(--cyan)}
        .modal-close{
            background:none;border:none;color:var(--dim);font-size:1.2rem;
            cursor:pointer;line-height:1;padding:.2rem;transition:color .2s;
        }
        .modal-close:hover{color:var(--text)}
        .modal-body{padding:1.2rem}
        .modal-footer{
            display:flex;justify-content:flex-end;gap:.6rem;
            padding:.8rem 1.2rem;border-top:1px solid var(--border);
        }

        /* form elements */
        .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:.8rem}
        .form-grid.single{grid-template-columns:1fr}
        .field{display:flex;flex-direction:column;gap:.3rem}
        .field-full{grid-column:1/-1}
        label{font-family:var(--mono);font-size:.6rem;color:var(--dim);letter-spacing:.08em}
        input[type=text],input[type=number],select.form-select{
            background:rgba(0,0,0,.4);border:1px solid var(--border);
            color:var(--text);font-family:var(--mono);font-size:.75rem;
            padding:.4rem .7rem;border-radius:5px;outline:none;
            transition:border-color .2s;width:100%;
        }
        input[type=text]:focus,input[type=number]:focus,select.form-select:focus{
            border-color:var(--cyan);
        }
        input[type=color]{
            width:100%;height:34px;border:1px solid var(--border);
            border-radius:5px;background:rgba(0,0,0,.4);cursor:pointer;padding:2px;
        }

        /* ── toast ── */
        .toast-container{
            position:fixed;bottom:1.5rem;right:1.5rem;
            display:flex;flex-direction:column;gap:.5rem;z-index:999;
        }
        .toast{
            display:flex;align-items:center;gap:.6rem;
            padding:.6rem 1rem;border-radius:6px;
            font-family:var(--mono);font-size:.7rem;
            animation:toastIn .3s ease;min-width:220px;
            box-shadow:0 4px 20px rgba(0,0,0,.4);
        }
        @keyframes toastIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
        .toast-success{background:rgba(0,232,122,.12);border:1px solid rgba(0,232,122,.4);color:var(--green)}
        .toast-error{background:rgba(255,45,85,.12);border:1px solid rgba(255,45,85,.4);color:var(--red)}
        .toast-info{background:rgba(0,210,244,.1);border:1px solid rgba(0,210,244,.35);color:var(--cyan)}

        /* scrollbar */
        ::-webkit-scrollbar{width:4px}
        ::-webkit-scrollbar-track{background:transparent}
        ::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
    </style>
</head>
<body>

<!-- HEADER -->
<div class="header">
    <div style="display:flex;align-items:center;gap:1rem">
        <div class="logo">⬡ ATHLETE <span>ADMIN</span></div>
        <div style="font-family:var(--mono);font-size:.6rem;color:var(--dim)">
            TEAM & PLAYER MANAGEMENT
        </div>
    </div>
    <a href="/" class="nav-link">← BACK TO DASHBOARD</a>
</div>

<!-- PAGE -->
<div class="page">

    <!-- tabs -->
    <div class="tabs">
        <button class="tab active" onclick="switchTab('teams',this)">⚽ TEAMS</button>
        <button class="tab"        onclick="switchTab('players',this)">🏃 PLAYERS</button>
    </div>

    <!-- ══ TEAMS SECTION ══════════════════════════════════════ -->
    <div class="section active" id="section-teams">
        <div class="section-header">
            <div class="section-title">REGISTERED TEAMS</div>
            <button class="btn btn-primary" onclick="openTeamModal()">+ ADD TEAM</button>
        </div>
        <div class="table-wrap">
            <table id="teamsTable">
                <thead>
                <tr>
                    <th>#</th>
                    <th>TEAM NAME</th>
                    <th>COUNTRY</th>
                    <th>FORMATION</th>
                    <th>BADGE COLOR</th>
                    <th>SQUAD</th>
                    <th>ACTIONS</th>
                </tr>
                </thead>
                <tbody id="teamsBody">
                <tr><td colspan="7"><div class="empty-state">Loading...</div></td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- ══ PLAYERS SECTION ════════════════════════════════════ -->
    <div class="section" id="section-players">
        <div class="section-header">
            <div class="section-title">SQUAD MANAGEMENT</div>
            <button class="btn btn-primary" onclick="openPlayerModal()">+ ADD PLAYER</button>
        </div>

        <!-- team filter -->
        <div class="filter-bar">
            <span class="filter-label">TEAM</span>
            <select class="filter-select" id="playerTeamFilter" onchange="loadPlayers()">
                <option value="">— select team —</option>
            </select>
            <span class="filter-label" id="squadCount" style="margin-left:auto"></span>
        </div>

        <div class="table-wrap">
            <table id="playersTable">
                <thead>
                <tr>
                    <th>#</th>
                    <th>NAME</th>
                    <th>POS</th>
                    <th>AGE</th>
                    <th>FITNESS</th>
                    <th>MAX SPD</th>
                    <th>REST HR</th>
                    <th>ACTIONS</th>
                </tr>
                </thead>
                <tbody id="playersBody">
                <tr><td colspan="8">
                    <div class="empty-state">Select a team to view squad</div>
                </td></tr>
                </tbody>
            </table>
        </div>
    </div>

</div><!-- /page -->

<!-- ══ TEAM MODAL ════════════════════════════════════════════ -->
<div class="modal-overlay" id="teamModal">
    <div class="modal">
        <div class="modal-header">
            <div class="modal-title" id="teamModalTitle">ADD TEAM</div>
            <button class="modal-close" onclick="closeModal('teamModal')">✕</button>
        </div>
        <div class="modal-body">
            <div class="form-grid">
                <div class="field field-full">
                    <label>TEAM NAME *</label>
                    <input type="text" id="tName" placeholder="e.g. Arsenal FC"/>
                </div>
                <div class="field">
                    <label>COUNTRY</label>
                    <input type="text" id="tCountry" placeholder="e.g. England"/>
                </div>
                <div class="field">
                    <label>FORMATION *</label>
                    <select class="form-select" id="tFormation">
                        <option value="4-3-3">4-3-3</option>
                        <option value="4-4-2">4-4-2</option>
                        <option value="3-5-2">3-5-2</option>
                        <option value="4-2-3-1">4-2-3-1</option>
                        <option value="3-4-3">3-4-3</option>
                    </select>
                </div>
                <div class="field">
                    <label>BADGE COLOR</label>
                    <input type="color" id="tColor" value="#00e87a"/>
                </div>
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn btn-edit" onclick="closeModal('teamModal')">CANCEL</button>
            <button class="btn btn-primary" onclick="saveTeam()">SAVE TEAM</button>
        </div>
    </div>
</div>

<!-- ══ PLAYER MODAL ══════════════════════════════════════════ -->
<div class="modal-overlay" id="playerModal">
    <div class="modal">
        <div class="modal-header">
            <div class="modal-title" id="playerModalTitle">ADD PLAYER</div>
            <button class="modal-close" onclick="closeModal('playerModal')">✕</button>
        </div>
        <div class="modal-body">
            <div class="form-grid">

                <div class="field field-full">
                    <label>TEAM *</label>
                    <select class="form-select" id="pTeam"></select>
                </div>

                <div class="field field-full">
                    <label>FULL NAME *</label>
                    <input type="text" id="pName" placeholder="e.g. Bukayo Saka"/>
                </div>

                <div class="field">
                    <label>SHIRT NUMBER *</label>
                    <input type="number" id="pShirt" min="1" max="99" placeholder="7"/>
                </div>

                <div class="field">
                    <label>AGE</label>
                    <input type="number" id="pAge" min="16" max="45" placeholder="23"/>
                </div>

                <div class="field">
                    <label>POSITION CODE *</label>
                    <select class="form-select" id="pPos">
                        <option value="GK">GK — Goalkeeper</option>
                        <option value="CB">CB — Center Back</option>
                        <option value="LB">LB — Left Back</option>
                        <option value="RB">RB — Right Back</option>
                        <option value="LWB">LWB — Left Wing Back</option>
                        <option value="RWB">RWB — Right Wing Back</option>
                        <option value="CDM">CDM — Def. Midfielder</option>
                        <option value="CM">CM — Center Mid</option>
                        <option value="CAM">CAM — Att. Midfielder</option>
                        <option value="LM">LM — Left Mid</option>
                        <option value="RM">RM — Right Mid</option>
                        <option value="LW">LW — Left Wing</option>
                        <option value="RW">RW — Right Wing</option>
                        <option value="ST">ST — Striker</option>
                    </select>
                </div>

                <div class="field">
                    <label>POSITION FULL</label>
                    <input type="text" id="pPosFull" placeholder="e.g. Right Wing"/>
                </div>

                <div class="field">
                    <label>FITNESS LEVEL (1–5) *</label>
                    <input type="number" id="pFitness" min="1" max="5" placeholder="4"/>
                </div>

                <div class="field">
                    <label>MAX SPEED (m/s)</label>
                    <input type="number" id="pMaxSpd" min="4" max="12" step="0.1" placeholder="9.0"/>
                </div>

                <div class="field">
                    <label>RESTING HR (bpm)</label>
                    <input type="number" id="pRestHr" min="40" max="80" placeholder="56"/>
                </div>

            </div>
        </div>
        <div class="modal-footer">
            <button class="btn btn-edit" onclick="closeModal('playerModal')">CANCEL</button>
            <button class="btn btn-primary" onclick="savePlayer()">SAVE PLAYER</button>
        </div>
    </div>
</div>

<!-- TOAST CONTAINER -->
<div class="toast-container" id="toastContainer"></div>

<script>
    // ── state ──────────────────────────────────────────────────────
    let teams        = [];
    let editingTeamId   = null;
    let editingPlayerId = null;

    // ── init ───────────────────────────────────────────────────────
    window.addEventListener('DOMContentLoaded', () => {
        loadTeams();
    });

    // ── tabs ───────────────────────────────────────────────────────
    function switchTab(name, btn) {
        document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('section-' + name).classList.add('active');
    }

    // ── load teams ─────────────────────────────────────────────────
    function loadTeams() {
        fetch('/api/admin/teams')
            .then(r => r.json())
            .then(data => {
                teams = data;
                renderTeamsTable(data);
                populateTeamSelects(data);
            })
            .catch(() => toast('Failed to load teams', 'error'));
    }

    function renderTeamsTable(data) {
        const tbody = document.getElementById('teamsBody');
        if (!data.length) {
            tbody.innerHTML = '<tr><td colspan="7"><div class="empty-state">No teams yet — add one!</div></td></tr>';
            return;
        }
        tbody.innerHTML = data.map(t => `
    <tr>
      <td class="mono">${t.id}</td>
      <td>
        <span class="badge-dot" style="background:${t.badgeColor || '#00e87a'}"></span>
        <strong>${t.name}</strong>
      </td>
      <td class="mono">${t.country || '—'}</td>
      <td><span class="pos-badge">${t.formation}</span></td>
      <td>
        <span class="badge-dot" style="background:${t.badgeColor || '#ccc'}"></span>
        <span class="mono" style="font-size:.65rem">${t.badgeColor || '—'}</span>
      </td>
      <td class="mono">${(t.players || []).length} players</td>
      <td>
        <div class="actions">
          <button class="btn btn-edit btn-sm"
                  onclick="openTeamModal(${t.id})">EDIT</button>
          <button class="btn btn-danger btn-sm"
                  onclick="confirmDeleteTeam(${t.id},'${escHtml(t.name)}')">DELETE</button>
        </div>
      </td>
    </tr>
  `).join('');
    }

    function populateTeamSelects(data) {
        // player team filter
        const filter = document.getElementById('playerTeamFilter');
        const currentFilter = filter.value;
        filter.innerHTML = '<option value="">— select team —</option>'
            + data.map(t => `<option value="${t.id}" ${String(t.id)===currentFilter?'selected':''}>${t.name}</option>`).join('');

        // player modal team select
        const pTeam = document.getElementById('pTeam');
        const currentPTeam = pTeam.value;
        pTeam.innerHTML = data.map(t =>
            `<option value="${t.id}" ${String(t.id)===currentPTeam?'selected':''}>${t.name}</option>`
        ).join('');
    }

    // ── load players ───────────────────────────────────────────────
    function loadPlayers() {
        const teamId = document.getElementById('playerTeamFilter').value;
        if (!teamId) {
            document.getElementById('playersBody').innerHTML =
                '<tr><td colspan="8"><div class="empty-state">Select a team to view squad</div></td></tr>';
            document.getElementById('squadCount').textContent = '';
            return;
        }

        fetch(`/api/admin/teams/${teamId}/players`)
            .then(r => r.json())
            .then(players => {
                document.getElementById('squadCount').textContent =
                    `${players.length} PLAYERS IN SQUAD`;
                renderPlayersTable(players);
            })
            .catch(() => toast('Failed to load players', 'error'));
    }

    function renderPlayersTable(players) {
        const tbody = document.getElementById('playersBody');
        if (!players.length) {
            tbody.innerHTML = '<tr><td colspan="8"><div class="empty-state">No players in this squad yet</div></td></tr>';
            return;
        }
        const sorted = [...players].sort((a,b) => a.shirtNumber - b.shirtNumber);
        tbody.innerHTML = sorted.map(p => `
    <tr>
      <td><strong style="font-family:var(--display);color:var(--cyan)">${p.shirtNumber}</strong></td>
      <td>${p.name}</td>
      <td><span class="pos-badge">${p.position}</span></td>
      <td class="mono">${p.age || '—'}</td>
      <td>
        <div class="fitness-dots">
          ${[1,2,3,4,5].map(i =>
            `<div class="fitness-dot ${i <= (p.fitnessLevel||0) ? 'filled' : ''}"></div>`
        ).join('')}
        </div>
      </td>
      <td class="mono">${p.maxSpeed ? p.maxSpeed.toFixed(1)+' m/s' : '—'}</td>
      <td class="mono">${p.restingHr ? p.restingHr+' bpm' : '—'}</td>
      <td>
        <div class="actions">
          <button class="btn btn-edit btn-sm"
                  onclick="openPlayerModal(${p.id})">EDIT</button>
          <button class="btn btn-danger btn-sm"
                  onclick="confirmDeletePlayer(${p.id},'${escHtml(p.name)}')">DELETE</button>
        </div>
      </td>
    </tr>
  `).join('');
    }

    // ── team modal ─────────────────────────────────────────────────
    function openTeamModal(teamId = null) {
        editingTeamId = teamId;
        document.getElementById('teamModalTitle').textContent =
            teamId ? 'EDIT TEAM' : 'ADD TEAM';

        if (teamId) {
            const t = teams.find(x => x.id === teamId);
            if (t) {
                document.getElementById('tName').value      = t.name       || '';
                document.getElementById('tCountry').value   = t.country    || '';
                document.getElementById('tFormation').value = t.formation  || '4-3-3';
                document.getElementById('tColor').value     = t.badgeColor || '#00e87a';
            }
        } else {
            document.getElementById('tName').value      = '';
            document.getElementById('tCountry').value   = '';
            document.getElementById('tFormation').value = '4-3-3';
            document.getElementById('tColor').value     = '#00e87a';
        }

        openModal('teamModal');
    }

    function saveTeam() {
        const name = document.getElementById('tName').value.trim();
        if (!name) { toast('Team name is required', 'error'); return; }

        const body = {
            name,
            country:    document.getElementById('tCountry').value.trim(),
            formation:  document.getElementById('tFormation').value,
            badgeColor: document.getElementById('tColor').value,
        };

        const url    = editingTeamId ? `/api/admin/teams/${editingTeamId}` : '/api/admin/teams';
        const method = editingTeamId ? 'PUT' : 'POST';

        fetch(url, {
            method,
            headers: {'Content-Type':'application/json'},
            body: JSON.stringify(body)
        })
            .then(r => { if (!r.ok) throw new Error(r.status); return r.json(); })
            .then(() => {
                toast(editingTeamId ? 'Team updated!' : 'Team created!', 'success');
                closeModal('teamModal');
                loadTeams();
            })
            .catch(e => toast('Save failed: ' + e.message, 'error'));
    }

    function confirmDeleteTeam(id, name) {
        if (!confirm(`Delete team "${name}"?\nThis will also delete ALL players in the squad.`)) return;
        fetch(`/api/admin/teams/${id}`, { method:'DELETE' })
            .then(r => { if (!r.ok) throw new Error(r.status); })
            .then(() => { toast('Team deleted', 'info'); loadTeams(); })
            .catch(e => toast('Delete failed: ' + e.message, 'error'));
    }

    // ── player modal ───────────────────────────────────────────────
    function openPlayerModal(playerId = null) {
        editingPlayerId = playerId;
        document.getElementById('playerModalTitle').textContent =
            playerId ? 'EDIT PLAYER' : 'ADD PLAYER';

        // pre-select team from filter
        const filterTeam = document.getElementById('playerTeamFilter').value;
        if (filterTeam) document.getElementById('pTeam').value = filterTeam;

        if (playerId) {
            // find player across all teams
            let found = null;
            teams.forEach(t => {
                const p = (t.players||[]).find(p => p.id === playerId);
                if (p) found = p;
            });
            if (found) {
                document.getElementById('pName').value    = found.name          || '';
                document.getElementById('pShirt').value   = found.shirtNumber   || '';
                document.getElementById('pAge').value     = found.age           || '';
                document.getElementById('pPos').value     = found.position      || 'CM';
                document.getElementById('pPosFull').value = found.positionFull  || '';
                document.getElementById('pFitness').value = found.fitnessLevel  || '';
                document.getElementById('pMaxSpd').value  = found.maxSpeed      || '';
                document.getElementById('pRestHr').value  = found.restingHr     || '';
            }
        } else {
            ['pName','pShirt','pAge','pPosFull','pFitness','pMaxSpd','pRestHr']
                .forEach(id => document.getElementById(id).value = '');
            document.getElementById('pPos').value = 'CM';
        }

        openModal('playerModal');
    }

    function savePlayer() {
        const name  = document.getElementById('pName').value.trim();
        const shirt = document.getElementById('pShirt').value;
        const pos   = document.getElementById('pPos').value;
        const fit   = document.getElementById('pFitness').value;

        if (!name || !shirt || !pos || !fit) {
            toast('Name, shirt number, position and fitness are required', 'error');
            return;
        }

        const body = {
            name,
            shirtNumber:  parseInt(shirt),
            position:     pos,
            positionFull: document.getElementById('pPosFull').value.trim() || pos,
            age:          parseInt(document.getElementById('pAge').value)    || null,
            fitnessLevel: parseInt(fit),
            maxSpeed:     parseFloat(document.getElementById('pMaxSpd').value) || null,
            restingHr:    parseInt(document.getElementById('pRestHr').value)   || null,
        };

        let url, method;
        if (editingPlayerId) {
            url    = `/api/admin/players/${editingPlayerId}`;
            method = 'PUT';
        } else {
            const teamId = document.getElementById('pTeam').value;
            if (!teamId) { toast('Select a team', 'error'); return; }
            url    = `/api/admin/teams/${teamId}/players`;
            method = 'POST';
        }

        fetch(url, {
            method,
            headers: {'Content-Type':'application/json'},
            body: JSON.stringify(body)
        })
            .then(r => { if (!r.ok) throw new Error(r.status); return r.json(); })
            .then(() => {
                toast(editingPlayerId ? 'Player updated!' : 'Player added!', 'success');
                closeModal('playerModal');
                loadTeams();       // refresh team data (player count)
                loadPlayers();     // refresh player table
            })
            .catch(e => toast('Save failed: ' + e.message, 'error'));
    }

    function confirmDeletePlayer(id, name) {
        if (!confirm(`Remove player "${name}" from the squad?`)) return;
        fetch(`/api/admin/players/${id}`, { method:'DELETE' })
            .then(r => { if (!r.ok) throw new Error(r.status); })
            .then(() => { toast('Player removed', 'info'); loadTeams(); loadPlayers(); })
            .catch(e => toast('Delete failed: ' + e.message, 'error'));
    }

    // ── modal helpers ──────────────────────────────────────────────
    function openModal(id) {
        document.getElementById(id).classList.add('open');
    }
    function closeModal(id) {
        document.getElementById(id).classList.remove('open');
    }
    // close on overlay click
    document.querySelectorAll('.modal-overlay').forEach(overlay => {
        overlay.addEventListener('click', e => {
            if (e.target === overlay) overlay.classList.remove('open');
        });
    });

    // ── toasts ─────────────────────────────────────────────────────
    function toast(message, type = 'info') {
        const container = document.getElementById('toastContainer');
        const div = document.createElement('div');
        div.className = `toast toast-${type}`;
        const icon = type === 'success' ? '✓' : type === 'error' ? '✕' : 'ℹ';
        div.innerHTML = `<span>${icon}</span><span>${message}</span>`;
        container.appendChild(div);
        setTimeout(() => {
            div.style.opacity = '0';
            div.style.transition = 'opacity .3s';
            setTimeout(() => div.remove(), 300);
        }, 3000);
    }

    // ── utils ──────────────────────────────────────────────────────
    function escHtml(str) {
        return String(str).replace(/'/g, "\\'").replace(/"/g, '&quot;');
    }
</script>
</body>
</html>
